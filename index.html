<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гарант Бот - Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: rgba(25, 25, 25, 0.7);
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.4);
            --success: #32d74b;
            --danger: #ff453a;
            --border: rgba(255, 255, 255, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, var(--bg-color) 70%);
            background-attachment: fixed;
            padding-bottom: 80px;
        }
        .container { padding: 20px; }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        h2 { font-size: 22px; margin-bottom: 16px; font-weight: 600; }
        h3 { font-size: 16px; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        input, textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        textarea { resize: none; height: 100px; }
        .btn {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn.secondary { background: rgba(255,255,255,0.1); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .stat-box .value { font-size: 24px; font-weight: bold; margin-bottom: 4px; color: var(--accent); }
        .stat-box .label { font-size: 12px; color: var(--text-muted); }
        .deal-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .deal-item:last-child { border-bottom: none; padding-bottom: 0; }
        .deal-info .title { font-weight: 600; margin-bottom: 4px; }
        .deal-info .desc { font-size: 13px; color: var(--text-muted); }
        .deal-amount { font-weight: bold; color: var(--success); text-align: right; }
        .deal-amount.minus { color: var(--danger); }
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .nav-item { color: var(--text-muted); text-align: center; font-size: 12px; cursor: pointer; flex: 1; transition: color 0.3s; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--accent); }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="create-deal" class="container section active">
        <div class="card">
            <h2><i class="fa-solid fa-handshake"></i> Новая сделка</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">
                Укажите данные сделки. Партнер получит встречное предложение в боте.
            </p>

            <div class="input-group">
                <label>Юзернейм второго участника</label>
                <input type="text" id="partner-username" placeholder="@username" autocomplete="off">
            </div>

            <div class="input-group">
                <label>Сумма к депонированию (TON / ₽)</label>
                <input type="number" id="deal-amount" placeholder="0.00">
            </div>

            <div class="input-group">
                <label>Условия и объект сделки</label>
                <textarea id="deal-desc" placeholder="Что передается, гарантии, сроки..."></textarea>
            </div>

            <button class="btn" onclick="sendDealInvite()">
                <i class="fa-solid fa-paper-plane"></i> Предложить сделку
            </button>
        </div>
    </div>

    <div id="profile" class="container section">
        <div class="card" style="text-align: center; padding-top: 30px;">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--accent), #8a2be2); border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 32px;">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 id="user-display-name">Загрузка...</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">@<span id="user-tg-username">username</span></p>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="value">0.00</div>
                    <div class="label">Заморожено</div>
                </div>
                <div class="stat-box">
                    <div class="value">0</div>
                    <div class="label">Всего сделок</div>
                </div>
            </div>

            <button class="btn secondary" onclick="requestWithdrawal()">
                <i class="fa-solid fa-wallet"></i> Баланс / Вывод
            </button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('create-deal', this)">
            <i class="fa-solid fa-plus-circle"></i>
            Сделка
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <i class="fa-solid fa-user-shield"></i>
            Кабинет
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-display-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-tg-username').innerText = tg.initDataUnsafe.user.username || "no_username";
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        function sendDealInvite() {
            const partner = document.getElementById('partner-username').value;
            const amount = document.getElementById('deal-amount').value;
            const desc = document.getElementById('deal-desc').value;

            if (!partner || !amount || !desc) {
                tg.showAlert("Заполните все поля сделки!");
                return;
            }

            const data = JSON.stringify({
                action: "create_invite",
                partner: partner.replace('@', ''),
                amount: amount,
                desc: desc
            });

            tg.sendData(data); 
        }

        function requestWithdrawal() {
            tg.sendData(JSON.stringify({ action: "open_balance" }));
        }
    </script>
</body>
</html>
