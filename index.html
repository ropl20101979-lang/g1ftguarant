<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift Guarant - Premium Escrow</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #050505; 
            --card-bg: rgba(20, 20, 22, 0.9); 
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-gold: #d4af37; 
            --accent-glow: rgba(212, 175, 55, 0.15);
            --btn-bg: linear-gradient(135deg, #d4af37 0%, #aa8c2c 100%);
            --success-color: #32d74b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            padding-bottom: 90px; min-height: 100vh; overflow-x: hidden;
            position: relative;
        }

        /* Фоновые узоры знаков доллара $ */
        body::before {
            content: "$ $ $ $ $ $ $\n$ $ $ $ $ $ $\n$ $ $ $ $ $ $\n$ $ $ $ $ $ $";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            color: rgba(255, 255, 255, 0.02); font-size: 32px; line-height: 80px;
            letter-spacing: 35px; padding: 20px; z-index: -1; pointer-events: none;
            transform: rotate(-15deg) scale(1.2);
        }

        .header { padding: 18px 20px; border-bottom: 1px solid var(--card-border); background: #0a0a0c; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 18px; font-weight: 800; background: var(--btn-bg); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 0.5px; }

        .tab-content { display: none; padding: 16px; animation: fadeUp 0.3s ease-out; }
        .tab-content.active { display: block; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .section-title { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; font-weight: 700; }

        /* Ввод данных */
        .input-group { margin-bottom: 14px; position: relative; }
        .input-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }
        .input-field { width: 100%; background: #000; border: 1px solid var(--card-border); border-radius: 12px; padding: 14px 14px 14px 40px; color: #fff; font-size: 15px; outline: none; }
        .input-field:focus { border-color: var(--accent-gold); }
        .input-icon { position: absolute; left: 14px; top: 32px; font-size: 15px; color: var(--text-muted); }
        textarea.input-field { padding: 14px; min-height: 70px; resize: none; }

        .btn { width: 100%; background: var(--btn-bg); color: #000; border: none; border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 12px var(--accent-glow); }
        .btn:active { transform: scale(0.98); }

        /* Профиль */
        .profile-info { margin-bottom: 16px; }
        .profile-username { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 2px; }
        
        .balance-container { background: #000; border-radius: 12px; padding: 14px; border: 1px solid var(--card-border); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .balance-val { font-size: 24px; font-weight: 800; color: #fff; margin-top: 2px; }
        .btn-withdraw { background: rgba(255,255,255,0.08); color: var(--accent-gold); border: 1px solid rgba(212,175,55,0.3); padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; }

        .stat-line { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .stat-line:last-child { border-bottom: none; }

        /* Элементы Сделок */
        .deal-item { padding: 12px 0; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }
        .deal-item:last-child { border-bottom: none; }
        .deal-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; color: #fff; }
        .deal-sub { font-size: 11px; color: var(--text-muted); }
        .deal-price { font-size: 15px; font-weight: 700; text-align: right; }
        .status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 2px; }

        .empty-text { text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0; font-style: italic; }

        /* Навбар */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #0a0a0c; border-top: 1px solid var(--card-border); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 11px; font-weight: 600; width: 50%; cursor: pointer; }
        .nav-item.active { color: var(--accent-gold); }
        .nav-icon { font-size: 20px; }

        /* Модалка вывода */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(3px); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #111; border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; width: 100%; max-width: 340px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">GIFT GUARANT 🛡️</div>
        <div style="font-size: 11px; color: var(--text-muted); font-weight: bold; letter-spacing: 1px;">ESCROW</div>
    </div>

    <!-- ТАБ 1: ИНИЦИАЦИЯ СДЕЛКИ -->
    <div id="tab-deal" class="tab-content active">
        <div class="card">
            <div class="section-title">🤝 Пригласить в сделку</div>
            
            <div class="input-group">
                <label class="input-label">Юзернейм участника</label>
                <span class="input-icon">@</span>
                <input type="text" id="partner_username" class="input-field" placeholder="username">
            </div>

            <div class="input-group">
                <label class="input-label">Сумма (RUB)</label>
                <span class="input-icon">₽</span>
                <input type="number" id="deal_amount" class="input-field" placeholder="0">
            </div>

            <div class="input-group">
                <label class="input-label">Условия и описание контракта</label>
                <textarea id="deal_desc" class="input-field" placeholder="Опишите предмет сделки максимально подробно..."></textarea>
            </div>

            <button class="btn" onclick="sendDealInvite()">Отправить инвайт партнеру</button>
        </div>
    </div>

    <!-- ТАБ 2: РЕАЛЬНЫЙ ПРОФИЛЬ -->
    <div id="tab-profile" class="tab-content">
        <div class="card">
            <div class="profile-info">
                <div class="profile-username" id="user_title">@User</div>
                <div style="font-size: 12px; color: var(--text-muted);">Участник экосистемы гаранта</div>
            </div>

            <div class="balance-container">
                <div>
                    <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase;">Доступный баланс</div>
                    <div class="balance-val"><span id="bal_rub">0</span> ₽</div>
                </div>
                <button class="btn-withdraw" onclick="document.getElementById('withdraw-modal').classList.add('active')">Вывод средств 📤</button>
            </div>

            <div class="stat-line">
                <span style="color: var(--text-muted);">Успешных сделок через бота:</span>
                <span style="font-weight: bold; color: var(--success-color);" id="stats_count">0</span>
            </div>
            <div class="stat-line">
                <span style="color: var(--text-muted);">Баланс в TON Coin:</span>
                <span style="font-weight: bold;" id="bal_ton">0.00 TON</span>
            </div>
            <div class="stat-line">
                <span style="color: var(--text-muted);">Баланс в Stars:</span>
                <span style="font-weight: bold;" id="bal_stars">0 💫</span>
            </div>
        </div>

        <div class="section-title">⏳ Активные сделки в процессе</div>
        <div class="card" id="active_deals_container">
            <!-- Сюда программно загрузятся реальные активные сделки -->
        </div>

        <div class="section-title">📜 История прошлых сделок</div>
        <div class="card" id="past_deals_container">
            <!-- Сюда программно загрузятся реальные закрытые сделки -->
        </div>
    </div>

    <!-- Модалка вывода -->
    <div id="withdraw-modal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-bottom: 12px; font-size: 16px;">Вывод средств</h3>
            <div class="input-group">
                <label class="input-label">Метод перевода</label>
                <select class="input-field" id="w_method" style="padding-left: 14px;">
                    <option value="RUB">Банковская карта (СБП)</option>
                    <option value="TON">TON кошелек</option>
                    <option value="STARS">Telegram Stars</option>
                </select>
            </div>
            <div class="input-group">
                <label class="input-label">Реквизиты или адрес</label>
                <input type="text" id="w_req" class="input-field" style="padding-left: 14px;" placeholder="Номер карты или кошелька">
            </div>
            <button class="btn" onclick="sendWithdrawClaim()">Подать заявку на вывод</button>
        </div>
    </div>

    <!-- ТАБ-БАР -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('tab-deal', this)">
            <span class="nav-icon">🤝</span>
            <span>Сделка</span>
        </div>
        <div class="nav-item" onclick="switchTab('tab-profile', this)">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 1. ПАРСИНГ РЕАЛЬНЫХ ДАННЫХ ИЗ ССЫЛКИ БОТА
        const urlParams = new URLSearchParams(window.location.search);
        
        // Заполняем балансы и имя
        document.getElementById('bal_rub').innerText = Number(urlParams.get('rub') || 0).toLocaleString();
        document.getElementById('bal_ton').innerText = (urlParams.get('ton') || 0) + ' TON';
        document.getElementById('bal_stars').innerText = (urlParams.get('stars') || 0) + ' 💫';
        document.getElementById('stats_count').innerText = urlParams.get('deals') || 0;
        
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user_title').innerText = '@' + (tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name);
        }

        // Декодер зашифрованных списков сделок
        function decodeDeals(base64Str) {
            if (!base64Str) return [];
            try {
                let base64 = base64Str.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) { base64 += '='; }
                return JSON.parse(decodeURIComponent(escape(atob(base64))));
            } catch (e) {
                return [];
            }
        }

        const activeDeals = decodeDeals(urlParams.get('active'));
        const pastDeals = decodeDeals(urlParams.get('past'));

        // Рендеринг активных сделок
        const activeContainer = document.getElementById('active_deals_container');
        if (activeDeals.length === 0) {
            activeContainer.innerHTML = '<div class="empty-text">Нет активных сделок на данный момент</div>';
        } else {
            activeContainer.innerHTML = '';
            activeDeals.forEach(d => {
                activeContainer.innerHTML += `
                    <div class="deal-item">
                        <div class="deal-info">
                            <div class="deal-title">${d.desc}</div>
                            <div class="deal-sub">Роль: ${d.role} • С партнёром: ${d.partner}</div>
                        </div>
                        <div class="deal-price">
                            ${d.amount} ${d.currency}
                            <div class="status-badge" style="color:#d4af37;">${d.status}</div>
                        </div>
                    </div>`;
            });
        }

        // Рендеринг прошлых сделок
        const pastContainer = document.getElementById('past_deals_container');
        if (pastDeals.length === 0) {
            pastContainer.innerHTML = '<div class="empty-text">История прошлых сделок пуста</div>';
        } else {
            pastContainer.innerHTML = '';
            pastDeals.forEach(d => {
                pastContainer.innerHTML += `
                    <div class="deal-item">
                        <div class="deal-info">
                            <div class="deal-title">${d.desc}</div>
                            <div class="deal-sub">Роль: ${d.role} • С партнёром: ${d.partner}</div>
                        </div>
                        <div class="deal-price">
                            ${d.amount} ${d.currency}
                            <div class="status-badge" style="color:#32d74b;">выполнена</div>
                        </div>
                    </div>`;
            });
        }

        // Навигация
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // Действие: Отправить инвайт
        function sendDealInvite() {
            const username = document.getElementById('partner_username').value;
            const amount = document.getElementById('deal_amount').value;
            const desc = document.getElementById('deal_desc').value;

            if (!username || !amount || !desc) {
                tg.showAlert("Заполните юзернейм, сумму и описание контракта!");
                return;
            }

            tg.sendData(JSON.stringify({
                action: 'create_deal',
                partner: username.replace('@', '').trim(),
                amount: parseInt(amount),
                description: desc
            }));
        }

        // Действие: Вывод средств
        function sendWithdrawClaim() {
            const method = document.getElementById('w_method').value;
            const req = document.getElementById('w_req').value;

            if (!req) {
                tg.showAlert("Введите ваши реквизиты!");
                return;
            }

            tg.sendData(JSON.stringify({
                action: 'withdraw',
                method: method,
                requisites: req
            }));
            document.getElementById('withdraw-modal').classList.remove('active');
        }
    </script>
</body>
</html>
